services:
  app:
    container_name: simple-tasker-backend
    build:
      context: ./backend
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    depends_on:
      db:
        condition: service_healthy

  db:
    container_name: simple-tasker-db
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - simple_tasker_v:/var/lib/postgresql
    ports:
      - "${DB_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app_manualtest:
    container_name: simple-tasker-backend-manualtest
    build:
      context: ./backend
    ports:
      - "${APP_TEST_PORT:-8081}:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://test_db:5432/${POSTGRES_TEST_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_TEST_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_TEST_PASSWORD}
      SPRING_PROFILES_ACTIVE: manualtest
    depends_on:
      test_db:
        condition: service_healthy

  test_db:
    container_name: simple-tasker-db-test
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER}
      POSTGRES_DB: ${POSTGRES_TEST_DB}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD}
    ports:
      - "${DB_TEST_PORT:-5433}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER} -d ${POSTGRES_TEST_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  simple_tasker_v:

secrets:
  db_password:
    file: ./secrets/db_password.txt